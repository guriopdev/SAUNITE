<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload PYQ | SAU Scholar Hub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>SAU Scholar Hub</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="pyq.html">PYQs</a>
            <a href="notes.html">Notes</a>
            <a href="profile.html">Profile</a>
        </nav>
    </header>

    <div class="container">
        <div style="max-width: 600px; margin: 0 auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
            <h2>Upload Previous Year Question Paper</h2>
            <p>Please fill in the details correctly to help others find the paper easily.</p>
            <br>
            <form id="upload-form">
                <div class="form-group">
                    <label for="dept">Department</label>
                    <select id="dept" required>
                        <option value="">Select Department</option>
                        <option value="Computer Science">Computer Science</option>
                        <option value="Mathematics">Mathematics</option>
                        <option value="Economics">Economics</option>
                        <option value="Law">Law</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="subject">Subject Name</label>
                    <input type="text" id="subject" placeholder="e.g. Data Structures" required>
                </div>
                <div class="form-group">
                    <label for="year">Year</label>
                    <select id="year" required>
                        <option value="2026">2026</option>
                        <option value="2025">2025</option>
                        <option value="2024">2024</option>
                        <option value="2023">2023</option>
                        <option value="2022">2022</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="semester">Semester</label>
                    <select id="semester" required>
                        <option value="Odd">Odd</option>
                        <option value="Even">Even</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="file">Attach File (PDF/JPG/PNG)</label>
                    <input type="file" id="file" accept="image/*, .pdf" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Upload Paper</button>
            </form>
            <div id="success-msg" style="display: none; color: #28a745; margin-top: 1rem; text-align: center; font-weight: bold;">
                Upload Successful! Redirecting to repository...
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('upload-form').onsubmit = function(e) {
            e.preventDefault();
            const uploaderName = Math.random() < 0.5 ? 'gurjyot singh' : 'devansh dhaka';
            const newPyq = {
                id: Date.now(),
                dept: document.getElementById('dept').value,
                subject: document.getElementById('subject').value,
                year: document.getElementById('year').value,
                sem: document.getElementById('semester').value,
                uploader: uploaderName
            };
            handleUpload('sau_custom_pyqs', newPyq, document.getElementById('file'), 'pyq.html');
        };
    </script>
</body>
</html>
